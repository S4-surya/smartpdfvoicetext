<!DOCTYPE html>
<html>

<head>
<title>SmartPDFVoice</title>
</head>

<body>

<h1>SmartPDFVoice AI</h1>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="pdf" required>

<br><br>

<button type="submit">Explain PDF</button>

</form>

{% if explanation %}

<h3>Explanation</h3>
<p>{{ explanation }}</p>

<audio controls>
<source src="{{ audio }}">
</audio>

{% endif %}

</body>

</html>
